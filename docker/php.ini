; Réglages PHP pour la production
memory_limit = 512M
upload_max_filesize = 25M
post_max_size = 30M
; Filet de sécurité : au-delà de cette limite, PHP tronque SILENCIEUSEMENT les
; champs d'un formulaire (défaut : 1000). Les écrans catalogue (stock manuel,
; tarifs grossiste) n'envoient que les lignes modifiées, mais on garde de la marge.
max_input_vars = 5000
max_execution_time = 120
max_input_time = 120
expose_php = Off
date.timezone = UTC
