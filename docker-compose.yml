services:
  # ------------------------------------------------------------------
  # Application web : Nginx + PHP-FPM (image construite via Dockerfile)
  # ------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prosperous-app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    expose:
      - "80"
    networks:
      - internal

  # ------------------------------------------------------------------
  # Worker de file d'attente (jobs : dépenses, pertes, rapports...)
  # ------------------------------------------------------------------
  queue:
    image: prosperous-app:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - internal

  # ------------------------------------------------------------------
  # Planificateur (shift:reminders /10min, rapports quotidiens...)
  # ------------------------------------------------------------------
  scheduler:
    image: prosperous-app:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    command: php artisan schedule:work
    networks:
      - internal

  # ------------------------------------------------------------------
  # Base de données MySQL 8
  # ------------------------------------------------------------------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  # ------------------------------------------------------------------
  # Reverse-proxy Caddy : HTTPS automatique (Let's Encrypt)
  # ------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

volumes:
  db_data:
  storage_public:
  storage_logs:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
