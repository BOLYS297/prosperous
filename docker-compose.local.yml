services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prosperous-app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-prosperious}
      DB_USERNAME: ${DB_USERNAME:-prosperous}
      DB_PASSWORD: ${DB_PASSWORD:-prosperous}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    ports:
      - "8000:80"
    networks:
      - internal

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: prosperous-app:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-prosperious}
      DB_USERNAME: ${DB_USERNAME:-prosperous}
      DB_PASSWORD: ${DB_PASSWORD:-prosperous}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - internal

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: prosperous-app:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-prosperious}
      DB_USERNAME: ${DB_USERNAME:-prosperous}
      DB_PASSWORD: ${DB_PASSWORD:-prosperous}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - ./.env:/var/www/html/.env:ro
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    command: php artisan schedule:work
    networks:
      - internal

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-prosperious}
      MYSQL_USER: ${DB_USERNAME:-prosperous}
      MYSQL_PASSWORD: ${DB_PASSWORD:-prosperous}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${DB_ROOT_PASSWORD:-rootpass}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3307:3306"
    networks:
      - internal

volumes:
  db_data:
  storage_public:
  storage_logs:

networks:
  internal:
    driver: bridge
